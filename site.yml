---
- name: Lab4 service
  hosts: lab4
  become: true

  tasks:

    - name: Install packages
      apt:
        name:
          - python3
          - curl
        state: present
        update_cache: yes

    - name: Create service directory
      file:
        path: /opt/lab4-service/html
        state: directory
        mode: '0755'

    - name: Copy index.html
      copy:
        dest: /opt/lab4-service/html/index.html
        content: "<h1>Budyuk</h1>"
        mode: '0644'

    - name: Copy service script
      copy:
        src: service.sh
        dest: /opt/lab4-service/service.sh
        mode: '0755'

    - name: Copy systemd unit
      copy:
        src: lab4-service.service
        dest: /etc/systemd/system/lab4-service.service
        mode: '0644'

    - name: Reload systemd
      systemd:
        daemon_reload: true

    - name: Enable and start service
      systemd:
        name: lab4-service
        enabled: true
        state: started

    - name: Healthcheck
      uri:
        url: http://127.0.0.1:8000/
        status_code: 200
